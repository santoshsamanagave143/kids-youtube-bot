name: Daily Kids YouTube Upload

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu fonts-liberation --no-install-recommends

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Create output folders
        run: mkdir -p output/images

      - name: Run daily upload
        env:
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          GCLOUD_CREDENTIALS:      ${{ secrets.GCLOUD_CREDENTIALS }}
          YOUTUBE_CLIENT_ID:       ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:   ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:   ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python daily_upload.py

      - name: Alert on failure
        if: failure()
        run: echo "Pipeline failed on $(date) — check logs above"
